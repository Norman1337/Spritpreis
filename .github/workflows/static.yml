name: Deploy static content to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    env:
      API_KEY: ${{ vars.API_KEY }}  # oder secrets.API_KEY wenn du Secret nutzt

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      # ----------------------------
      # 1. Build folder erstellen
      # ----------------------------
      - name: Create build folder
        run: |
          rm -rf dist
          mkdir dist
          cp -r * dist/ || true

      # ----------------------------
      # 2. API Key sicher ersetzen
      # ----------------------------
      - name: Inject API key
        run: |
          echo "Before replace:"
          grep API_KEY dist/app.js || true

          sed -i "s|__API_KEY__|$API_KEY|g" dist/app.js

          echo "After replace:"
          grep API_KEY dist/app.js || true

      # ----------------------------
      # 3. Final check (wichtig!)
      # ----------------------------
      - name: Verify final file
        run: cat dist/app.js

      # ----------------------------
      # 4. Upload artifact
      # ----------------------------
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'dist'

      # ----------------------------
      # 5. Deploy
      # ----------------------------
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
