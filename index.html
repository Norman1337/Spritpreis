<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spritpreise Radar ⛽</title>
    <meta name="description" content="Aktuelle Spritpreise von Tankstellen in deiner Nähe.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <main class="container">
        <header class="glass-header">
            <h1>Spritpreis Radar</h1>
            <p>Finde die günstigsten Tankstellen in deiner Umgebung</p>
        </header>

        <section class="controls glass-panel">
            <div class="input-group">
                <button id="getLocationBtn" class="btn primary-btn">📍 Mein Standort</button>
                <div class="lat-lng-inputs">
                    <input type="number" id="latInput" placeholder="Breitengrad (Lat)" step="0.0001" value="49.99233">
                    <input type="number" id="lngInput" placeholder="Längengrad (Lng)" step="0.0001" value="8.66654">
                </div>
            </div>

            <div class="input-group">
                <label for="radInput">Radius (km): <span id="radValue">2</span> km</label>
                <input type="range" id="radInput" min="1" max="25" value="2">
            </div>

            <button id="searchBtn" class="btn action-btn">Tankstellen Suchen 🔍</button>
        </section>

        <section id="loadingIndicator" class="loading hidden">
            <div class="spinner"></div>
            <p>Lade Tankstellen...</p>
        </section>

        <section id="errorPanel" class="error hidden glass-panel">
            <p id="errorMessage"></p>
        </section>

        <section id="results" class="results-grid">
            <!-- Results will be injected here -->
        </section>
    </main>

    <script src="app.js"></script>
</body>

</html>
